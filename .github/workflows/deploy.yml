# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Automatic deployment to GitHub Pages on every push to `main`.
#
# Prerequisites (do once in your repo):
#   Settings → Pages → Source: "GitHub Actions"
#   Settings → Actions → General → Workflow permissions: "Read and write"
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Set the base path to your repo name for GitHub Pages:
          # e.g. if your repo is github.com/you/prayer-times-tv → /prayer-times-tv/
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_SETTINGS_PIN: ${{ secrets.VITE_SETTINGS_PIN }}
          VITE_SHOW_TEST_BUTTONS: ${{ vars.VITE_SHOW_TEST_BUTTONS || 'true' }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
